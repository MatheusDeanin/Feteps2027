<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Administração Financeira - Debug Mode</title>
</head>
<body>
    <nav>
        <button id="Inicial">Inicio</button>
        <button id="Tabela">Tabela Anual</button>
    </nav>

    <form onsubmit="calcular(event)">
        Salário Líquido : <br>
        <input type="number" id="salario" required><br><br>

        Despesas : <br>
        <input type="number" id="despesas" required><br><br>
        
        <select id="mes" required>
            <option value="">Selecione o mês</option>
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
        </select>

        <button type="submit">Calcular e Salvar</button>
    </form>
    <div id="resultado"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAyMghZo93kMIouIJkq-4PG8ZU4FrhQdGk",
  authDomain: "feteps2027.firebaseapp.com",
  projectId: "feteps2027",
  storageBucket: "feteps2027.firebasestorage.app",
  messagingSenderId: "283844171197",
  appId: "1:283844171197:web:c2ab45f3ba15c26c20aed4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 DISPONÍVEL GLOBAL
window.db = db;
window.collection = collection;
window.addDoc = addDoc;

// 🔥 FUNÇÃO PRINCIPAL
window.calcular = async function(event) {
    event.preventDefault();
    console.log("Botão clicado ✅");

    let salario = parseFloat(document.getElementById("salario").value);
    let despesas = parseFloat(document.getElementById("despesas").value);
    let mes = parseInt(document.getElementById("mes").value);

    if (isNaN(salario) || isNaN(despesas) || isNaN(mes)) {
        alert("Preencha tudo corretamente!");
        return;
    }

    let limite = salario * 0.80;
    let sobra = salario - despesas;

    let investimento = sobra > 0 ? sobra * 0.75 : 0;
    let uso = sobra > 0 ? sobra * 0.25 : 0;

    let mensagem = despesas > limite
        ? "⚠️ Acima de 80% de despesas!"
        : "✅ Dentro do limite!";

    try {
        await addDoc(collection(db, "financas"), {
            salario,
            despesas,
            mes,
            investimento,
            uso,
            data: new Date()
        });

        document.getElementById("resultado").innerHTML = `
            <b>✅ Salvo com sucesso!</b><br><br>
            Salário: R$ ${salario.toFixed(2)}<br>
            Despesas: R$ ${despesas.toFixed(2)}<br>
            Sobra: R$ ${sobra.toFixed(2)}<br><br>
            ${mensagem}<br><br>
            Investimento: R$ ${investimento.toFixed(2)}<br>
            Uso livre: R$ ${uso.toFixed(2)}
        `;

        console.log("Salvo no Firebase 🚀");

    } catch (erro) {
        console.error("Erro Firebase:", erro);
        alert("Erro ao salvar no Firebase!");
    }
};
</script>

</body>
</html>
